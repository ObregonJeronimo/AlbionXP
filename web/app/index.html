<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Albion Silver Hub — Precios en la web</title>
  <meta name="description" content="Comparador de precios de Albion Online en el navegador: buscá un item y mirá su precio en cada ciudad y en el Mercado Negro. Sin descargas." />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Alegreya+Sans:wght@400;500;700&display=swap" />
  <style>
    :root{
      --iron:#13110d;--iron2:#1a1610;--iron3:#211b13;--line:#372c1b;--line2:#4a3a22;
      --gold:#d9a441;--goldb:#f2c877;--silver:#c3cdd6;--text:#e7ddc7;--muted:#9c9179;--faint:#6f6650;
      --green:#7fb069;--red:#cc5b48;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Alegreya Sans',system-ui,sans-serif;background:
      radial-gradient(1100px 600px at 50% -10%,rgba(217,164,65,.10),transparent 60%),
      linear-gradient(180deg,#17130d,var(--iron) 42%) fixed;
      color:var(--text);min-height:100vh;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
    a{color:var(--gold);text-decoration:none}
    .wrap{max-width:1080px;margin:0 auto;padding:0 20px}
    /* header */
    header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,rgba(19,17,13,.97),rgba(19,17,13,.85));
      backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
    header .wrap{display:flex;align-items:center;gap:16px;height:60px}
    .brand{font-family:'Cinzel',serif;font-weight:700;letter-spacing:.06em;color:var(--text);font-size:16px}
    .brand b{color:var(--gold)}
    header .sp{flex:1}
    header a.back{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    header a.back:hover{color:var(--goldb)}
    /* intro */
    .intro{padding:34px 0 8px;text-align:center}
    .intro h1{font-family:'Cinzel',serif;font-weight:700;font-size:clamp(24px,4vw,36px)}
    .intro p{color:var(--muted);max-width:560px;margin:8px auto 0}
    /* controls */
    .controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:center;margin:20px 0 6px}
    .controls label{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-right:6px}
    select,.chk{background:var(--iron3);color:var(--text);border:1px solid var(--line2);border-radius:8px;padding:8px 12px;font-family:inherit;font-size:14px}
    .chk{display:inline-flex;align-items:center;gap:8px;cursor:pointer}
    /* search */
    .searchbox{position:relative;max-width:640px;margin:14px auto 0}
    #q{width:100%;background:var(--iron3);color:var(--text);border:1.5px solid var(--line2);border-radius:12px;
      padding:15px 18px 15px 46px;font-family:inherit;font-size:17px;outline:none}
    #q:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(217,164,65,.12)}
    .searchbox .mag{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--faint)}
    /* results grid — estilo Albion: iconos con marco de tier */
    .results{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:12px;margin:22px 0}
    .tile{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 8px 12px;
      background:var(--iron2);border:1px solid var(--line);border-radius:12px;cursor:pointer;position:relative;
      transition:border-color .12s,transform .12s,box-shadow .12s;text-align:center}
    .tile:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,0,0,.4)}
    .tile.sel{border-color:var(--goldb);box-shadow:0 0 0 2px rgba(242,200,119,.35)}
    .tile img{width:66px;height:66px;image-rendering:auto;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5))}
    .tile .tag{position:absolute;top:6px;left:6px;font-family:'Cinzel',serif;font-size:10.5px;font-weight:700;
      color:var(--goldb);background:rgba(0,0,0,.55);border:1px solid var(--line2);border-radius:5px;padding:1px 5px;letter-spacing:.02em}
    .tile .nm{font-size:12px;color:var(--muted);line-height:1.25;max-height:2.5em;overflow:hidden}
    .hint{color:var(--faint);text-align:center;font-size:14px;padding:30px 0}
    /* item panel */
    .panel{margin:16px 0 60px;background:var(--iron2);border:1px solid var(--line);border-radius:16px;overflow:hidden}
    .phead{display:flex;align-items:center;gap:16px;padding:18px 20px;border-bottom:1px solid var(--line);background:rgba(0,0,0,.15)}
    .phead img{width:64px;height:64px}
    .phead h2{font-family:'Cinzel',serif;font-size:20px;font-weight:700}
    .phead .sub{color:var(--muted);font-size:13px;margin-top:2px}
    .qtabs{display:flex;gap:6px;flex-wrap:wrap;padding:14px 20px 0}
    .qtab{background:var(--iron3);border:1px solid var(--line2);color:var(--muted);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit}
    .qtab.on{background:linear-gradient(180deg,var(--goldb),var(--gold));color:#1a1305;border-color:var(--gold);font-weight:700}
    .ptable{width:100%;border-collapse:collapse;margin-top:10px}
    .ptable th,.ptable td{padding:11px 20px;text-align:right;border-bottom:1px solid #241c12;font-variant-numeric:tabular-nums}
    .ptable th{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600}
    .ptable td.city,.ptable th.city{text-align:left;font-family:'Cinzel',serif;color:var(--text);font-size:14px}
    .ptable td.bm{color:var(--goldb)}
    .ptable .best{color:var(--green);font-weight:700}
    .ptable .worst{color:var(--red)}
    .ptable .age{font-size:12px;color:var(--faint)}
    .ptable .age.old{color:var(--red)}
    .pnote{padding:14px 20px 20px;color:var(--muted);font-size:13px}
    .loading{padding:40px;text-align:center;color:var(--muted)}
    .spin{display:inline-block;width:18px;height:18px;border:2px solid var(--line2);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;margin-right:8px}
    @keyframes sp{to{transform:rotate(360deg)}}
    .err{margin:16px 0;padding:16px 20px;border:1px solid var(--red);border-radius:12px;background:rgba(204,91,72,.08);color:#f0b6ab;font-size:14px}
    footer{border-top:1px solid var(--line);text-align:center;color:var(--faint);font-size:13px;padding:26px 0 34px}
    @media(max-width:640px){
      .ptable th,.ptable td{padding:10px 12px}
      .results{grid-template-columns:repeat(auto-fill,minmax(96px,1fr))}
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <span class="brand">Albion <b>Silver Hub</b></span>
      <span class="sp"></span>
      <a class="back" href="../index.html">← Inicio</a>
    </div>
  </header>

  <div class="wrap">
    <div class="intro">
      <h1>Precios de Albion, en la web</h1>
      <p>Buscá cualquier item y mirá su precio en cada ciudad y en el Mercado Negro. Sin descargar nada.</p>
    </div>

    <div class="controls">
      <div><label>Servidor</label>
        <select id="server">
          <option value="west">América (West)</option>
          <option value="europe">Europa</option>
          <option value="east">Asia (East)</option>
        </select>
      </div>
      <label class="chk"><input type="checkbox" id="premium" /> Tengo Premium (impuesto 4%)</label>
    </div>

    <div class="searchbox">
      <svg class="mag" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="text" autocomplete="off" placeholder="Cargando items del juego…" disabled />
    </div>

    <div id="results" class="results"></div>
    <div id="panel"></div>
  </div>

  <footer>
    Datos del Albion Online Data Project · proyecto independiente de fans · <a href="../index.html">albion-xp</a>
  </footer>

  <script>
  (function(){
    'use strict';
    var WORKER = 'https://albion-pagos.albionxp.workers.dev';
    var ITEMS_URL = 'https://raw.githubusercontent.com/ao-data/ao-bin-dumps/master/formatted/items.json';
    var CITIES = ['Bridgewatch','Fort Sterling','Lymhurst','Martlock','Thetford','Caerleon','Brecilien'];
    var LOCS = CITIES.concat(['Black Market']);
    var NO_DATE = '0001-01-01';

    var ITEMS = [], BYID = {};
    var STATE = { server:'west', premium:false, quality:1, id:null };

    var $ = function(id){ return document.getElementById(id); };
    function norm(s){ return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }
    function parseTier(id){ var m=/^T(\d)_/.exec(id); return m?+m[1]:0; }
    function parseEnch(id){ var m=/@(\d)$/.exec(id); return m?+m[1]:0; }
    function tierTag(t,e){ return t? ('T'+t+(e>0?'.'+e:'')) : ''; }
    function icon(id,q){ return 'https://render.albiononline.com/v1/item/'+encodeURIComponent(id)+'.png?quality='+(q||1)+'&size=128'; }
    function fmt(n){ return (n===null||n===undefined||isNaN(n))?'—':Math.round(n).toLocaleString('es'); }
    function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

    function dataAge(iso){
      if(!iso || iso.indexOf(NO_DATE)===0) return null;
      var t = Date.parse(iso.slice(-1)==='Z'?iso:iso+'Z'); if(isNaN(t)) return null;
      return (Date.now()-t)/60000; // minutos
    }
    function ageTxt(min){
      if(min===null) return '<span class="age old">sin datos</span>';
      var cls = min<360?'age':'age old', t;
      if(min<60) t=Math.round(min)+' min'; else if(min<1440) t=(min/60).toFixed(1)+' h'; else t=(min/1440).toFixed(1)+' d';
      return '<span class="'+cls+'">'+t+'</span>';
    }

    // ---------- carga de items ----------
    fetch(ITEMS_URL).then(function(r){return r.json();}).then(function(raw){
      for(var i=0;i<raw.length;i++){
        var it=raw[i], id=it.UniqueName, n=it.LocalizedNames; if(!id||!n) continue;
        var es=n['ES-ES']||n['EN-US']; if(!es) continue;
        var e={ id:id, es:es, en:n['EN-US']||es, tier:parseTier(id), ench:parseEnch(id) };
        e.key = norm(es)+' '+norm(e.en)+' '+id.toLowerCase();
        ITEMS.push(e); BYID[id]=e;
      }
      var q=$('q'); q.disabled=false; q.placeholder='Buscá un item (ej: espada, lingote, bolsa…)'; q.focus();
    }).catch(function(){
      $('q').placeholder='No se pudieron cargar los items — recargá la página.';
    });

    function search(query, limit){
      var q=norm((query||'').trim()); if(q.length<2) return [];
      var terms=q.split(/\s+/), out=[];
      for(var i=0;i<ITEMS.length;i++){ var e=ITEMS[i], ok=true;
        for(var t=0;t<terms.length;t++){ if(e.key.indexOf(terms[t])<0){ok=false;break;} }
        if(ok){ out.push(e); if(out.length>=limit*4) break; }
      }
      out.sort(function(a,b){
        var ap=norm(a.es).indexOf(q)===0?0:1, bp=norm(b.es).indexOf(q)===0?0:1;
        if(ap!==bp) return ap-bp;
        return a.es.length-b.es.length || a.tier-b.tier || a.ench-b.ench;
      });
      return out.slice(0,limit);
    }

    // ---------- render resultados (grid estilo Albion) ----------
    var results=$('results');
    function renderResults(list){
      if(!list.length){ results.innerHTML=''; return; }
      results.innerHTML = list.map(function(e){
        return '<button class="tile'+(e.id===STATE.id?' sel':'')+'" data-id="'+esc(e.id)+'">'+
          (e.tier?'<span class="tag">'+tierTag(e.tier,e.ench)+'</span>':'')+
          '<img loading="lazy" src="'+icon(e.id,1)+'" alt="" onerror="this.style.visibility=\'hidden\'"/>'+
          '<span class="nm">'+esc(e.es)+'</span></button>';
      }).join('');
    }

    var timer=null;
    $('q').addEventListener('input',function(){
      clearTimeout(timer); var v=this.value;
      timer=setTimeout(function(){ renderResults(search(v,48)); },120);
    });
    results.addEventListener('click',function(ev){
      var t=ev.target.closest('.tile'); if(t) selectItem(t.dataset.id);
    });

    // ---------- panel de precios ----------
    var panel=$('panel');
    function fetchPrices(id,quality){
      var locs = LOCS.map(function(c){return c.replace(/ /g,'');}).join(',');
      var path = '/api/v2/stats/prices/'+encodeURIComponent(id)+'?locations='+locs+'&qualities='+quality;
      var url = WORKER+'/aodp?server='+STATE.server+'&u='+encodeURIComponent(path);
      return fetch(url).then(function(r){ return r.json(); });
    }

    function selectItem(id){
      STATE.id=id; STATE.quality=1;
      // marcar tile seleccionada
      var tiles=results.querySelectorAll('.tile');
      for(var i=0;i<tiles.length;i++) tiles[i].classList.toggle('sel', tiles[i].dataset.id===id);
      renderPanel();
    }

    function renderPanel(){
      var e = BYID[STATE.id] || { id:STATE.id, es:STATE.id, tier:parseTier(STATE.id), ench:parseEnch(STATE.id) };
      panel.innerHTML =
        '<div class="panel">'+
          '<div class="phead">'+
            '<img src="'+icon(e.id,STATE.quality)+'" alt=""/>'+
            '<div><h2>'+(e.tier?tierTag(e.tier,e.ench)+' ':'')+esc(e.es)+'</h2>'+
              '<div class="sub">'+esc(e.id)+'</div></div>'+
          '</div>'+
          '<div class="qtabs" id="qtabs">'+[1,2,3,4,5].map(function(q){
            return '<button class="qtab'+(q===STATE.quality?' on':'')+'" data-q="'+q+'">Calidad '+q+'</button>';
          }).join('')+'</div>'+
          '<div id="pbody"><div class="loading"><span class="spin"></span>Consultando precios…</div></div>'+
        '</div>';
      $('qtabs').addEventListener('click',function(ev){
        var b=ev.target.closest('.qtab'); if(!b) return;
        STATE.quality=+b.dataset.q; renderPanel();
      });
      loadPrices(e);
    }

    function loadPrices(e){
      var body=$('pbody');
      fetchPrices(e.id, STATE.quality).then(function(data){
        if(!Array.isArray(data)){
          body.innerHTML='<div class="err">El proxy de precios todavía no está activo. (Hay que hacer el redeploy del worker: <code>npx wrangler deploy</code> en backend/worker.)</div>';
          return;
        }
        var byCity={};
        for(var i=0;i<data.length;i++){ var r=data[i]; byCity[r.city]=r; }
        var sells=[], buys=[];
        LOCS.forEach(function(c){ var r=byCity[c]; if(!r) return;
          var s=(r.sell_price_min && r.sell_price_min_date.indexOf(NO_DATE)!==0)?r.sell_price_min:null;
          var b=(r.buy_price_max && r.buy_price_max_date.indexOf(NO_DATE)!==0)?r.buy_price_max:null;
          if(s) sells.push(s); if(b) buys.push(b);
        });
        var minSell = sells.length?Math.min.apply(null,sells):null;
        var maxBuy = buys.length?Math.max.apply(null,buys):null;
        var tax = STATE.premium?0.04:0.08;

        var rows = LOCS.map(function(c){
          var r=byCity[c]||{};
          var s=(r.sell_price_min && (''+r.sell_price_min_date).indexOf(NO_DATE)!==0)?r.sell_price_min:null;
          var b=(r.buy_price_max && (''+r.buy_price_max_date).indexOf(NO_DATE)!==0)?r.buy_price_max:null;
          var age = dataAge(s?r.sell_price_min_date:(b?r.buy_price_max_date:null));
          var isBM = c==='Black Market';
          return '<tr>'+
            '<td class="city'+(isBM?' bm':'')+'">'+esc(c)+'</td>'+
            '<td class="'+(s&&s===minSell?'best':'')+'">'+fmt(s)+'</td>'+
            '<td class="'+(b&&b===maxBuy?'worst':'')+'">'+fmt(b)+'</td>'+
            '<td class="age">'+ageTxt(age)+'</td>'+
          '</tr>';
        }).join('');

        var netHint = minSell? ('Comprando en la ciudad más barata ('+fmt(minSell)+') y vendiendo con orden de venta, tras el impuesto del '+(tax*100)+'% te queda ~'+fmt(minSell*(1-tax))+' de neto por unidad si el precio no se mueve.') : '';

        body.innerHTML =
          '<table class="ptable"><thead><tr>'+
            '<th class="city">Ciudad</th><th>Venta mín.</th><th>Compra máx.</th><th>Datos</th>'+
          '</tr></thead><tbody>'+rows+'</tbody></table>'+
          '<p class="pnote">Verde = venta más barata · Rojo = compra más cara (mejor para vender al instante). '+
          'Los precios los aporta la comunidad y pueden estar viejos: mirá la columna "Datos". '+(STATE.premium?'':'Marcá "Premium" arriba si tenés la cuenta premium.')+
          (netHint?'<br>'+netHint:'')+'</p>';
      }).catch(function(err){
        body.innerHTML='<div class="err">No se pudieron cargar los precios: '+esc(err.message||String(err))+'</div>';
      });
    }

    // ---------- controles ----------
    $('server').addEventListener('change',function(){ STATE.server=this.value; if(STATE.id) renderPanel(); });
    $('premium').addEventListener('change',function(){ STATE.premium=this.checked; if(STATE.id) renderPanel(); });
  })();
  </script>
</body>
</html>
