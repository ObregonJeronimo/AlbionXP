# Config de despliegue del worker de pagos (Cloudflare Wrangler).
# Deploy: npx wrangler deploy  (desde backend/worker, tras `npx wrangler login`)
name = "albion-pagos"
main = "worker.js"
compatibility_date = "2026-01-01"

# Variables NO secretas (las secretas van con `npx wrangler secret put NOMBRE`):
#   MP_ACCESS_TOKEN  (secret) — token de producción de Mercado Pago
#   MP_WEBHOOK_SECRET (secret) — clave secreta del webhook de MP
#   SA_PRIVATE_KEY   (secret) — private_key del service account de Firebase
[vars]
FIREBASE_API_KEY = "PEGAR_WEB_API_KEY"
FIREBASE_PROJECT_ID = "PEGAR_PROJECT_ID"
SA_CLIENT_EMAIL = "PEGAR_CLIENT_EMAIL"
PLAN_AMOUNT = "5000"
PLAN_TITLE = "Albion Silver Hub — premium sin anuncios"
# Campañas de anuncios (JSON en una línea). Edítalo en el panel de Cloudflare
# (Settings > Variables) y los usuarios lo reciben al instante, sin recompilar.
ADS_JSON = '[{"id":"sponsor-slot","title":"📢 Tu anuncio aquí","body":"Patrocina Albion Silver Hub","url":"mailto:jeroobregon03@gmail.com?subject=Patrocinio","color":"#e3b341"}]'
